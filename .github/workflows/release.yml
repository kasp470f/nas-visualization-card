name: Manual Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Which semver bump: patch, minor, major'
        required: false
        default: 'patch'
      version:
        description: 'Exact version (overrides release_type), e.g. 1.2.3'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          set -e
          if [ -n "${INPUT_VERSION}" ]; then
            npm version "${INPUT_VERSION}"
          else
            npm version "${INPUT_TYPE}"
          fi

      - name: Push version commit and tags
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin HEAD
          git push origin --tags

      - name: Build
        run: npm run build

      - name: Get version
        id: get_version
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          release_name: Release v. ${{ steps.get_version.outputs.version }}
          body: "Automated release for version ${{ steps.get_version.outputs.version }}"
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/nas-drive-card.js
          asset_name: nas-card-drive.js
          asset_content_type: application/javascript
